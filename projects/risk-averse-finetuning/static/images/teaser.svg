<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">UT Austin style teaser banner</title>
  <desc id="desc">A clean academic banner with UT-inspired colors and a simple tower-like mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="100%" stop-color="#fff2e6"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="70" width="1460" height="760" rx="26" fill="#ffffff" stroke="#bf5700" stroke-width="8"/>

  <g transform="translate(200 170)">
    <circle cx="110" cy="110" r="110" fill="#bf5700"/>
    <g transform="translate(110 112)">
      <rect x="-18" y="-85" width="36" height="150" fill="#ffffff"/>
      <rect x="-38" y="52" width="76" height="18" fill="#ffffff"/>
      <rect x="-28" y="-102" width="56" height="18" fill="#ffffff"/>
      <rect x="-10" y="-132" width="20" height="32" fill="#ffffff"/>
      <circle cx="0" cy="-146" r="10" fill="#ffffff"/>
    </g>
  </g>

  <g transform="translate(420 210)">
    <text x="0" y="0" font-family="Google Sans, Arial, sans-serif" font-size="46" font-weight="700" fill="#bf5700">
      Risk-Averse Fine-Tuning
    </text>
    <text x="0" y="72" font-family="Google Sans, Arial, sans-serif" font-size="30" font-weight="500" fill="#2f2a24">
      Generating informative samples for CVaR-oriented downstream learning
    </text>

    <rect x="0" y="138" width="790" height="220" rx="18" fill="#fff8f2" stroke="#e7c3a1" stroke-width="2"/>
    <text x="36" y="196" font-family="Noto Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#7a3e00">
      Core idea
    </text>
    <text x="36" y="246" font-family="Noto Sans, Arial, sans-serif" font-size="24" fill="#3b342e">
      Bias a score-based generator toward high-loss regions under a reference model,
    </text>
    <text x="36" y="286" font-family="Noto Sans, Arial, sans-serif" font-size="24" fill="#3b342e">
      then use the synthesized samples with importance weighting to stabilize
    </text>
    <text x="36" y="326" font-family="Noto Sans, Arial, sans-serif" font-size="24" fill="#3b342e">
      optimization of tail-risk objectives such as CVaR.
    </text>
  </g>

  <g transform="translate(250 610)">
    <rect x="0" y="0" width="1100" height="110" rx="18" fill="#bf5700"/>
    <text x="550" y="67" text-anchor="middle" font-family="Google Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">
      The University of Texas at Austin
    </text>
  </g>
</svg>
